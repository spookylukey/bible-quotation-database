<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse — Bible Quotation Database</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="browse-page">
    <div class="browse-header">
      <h1>Bible Quotation Database</h1>
      <a class="back-link" href="index.html">&larr; Home</a>
    </div>

    <div class="tab-bar">
      <button class="active" data-tab="ot">OT References</button>
      <button data-tab="nt">NT References</button>
    </div>

    <div class="filter-bar">
      <label for="book-filter">Filter by book:</label>
      <select id="book-filter">
        <option value="">All books</option>
      </select>
      <span class="row-count" id="row-count"></span>
    </div>

    <div class="table-container">
      <div id="status" class="status">Loading…</div>

      <div id="panel-ot" class="tab-panel active">
        <table>
          <thead><tr><th>OT Reference</th><th>Quoted in (NT)</th></tr></thead>
          <tbody id="tbody-ot"></tbody>
        </table>
      </div>

      <div id="panel-nt" class="tab-panel">
        <table>
          <thead><tr><th>NT Reference</th><th>Quoting (OT)</th></tr></thead>
          <tbody id="tbody-nt"></tbody>
        </table>
      </div>
    </div>
    <script src="./browse.js"></script>
  </body>
</html>
